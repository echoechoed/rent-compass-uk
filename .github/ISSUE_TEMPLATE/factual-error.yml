name: Factual error
description: Report an incorrect, outdated, or unsupported rental claim
title: "[Fact]: "
labels:
  - factual-review
body:
  - type: dropdown
    id: jurisdiction
    attributes:
      label: Jurisdiction
      options:
        - England
        - Scotland
        - Wales
        - Northern Ireland
        - Cross-border
        - Not jurisdiction-specific
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: File, heading, or example output
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong?
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Direct source URL
    validations:
      required: true
  - type: input
    id: checked
    attributes:
      label: Date checked
      placeholder: YYYY-MM-DD
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
    validations:
      required: true
